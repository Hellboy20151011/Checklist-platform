name: API CI

on:
  workflow_dispatch:
  push:
    paths: [ 'apps/api/**', '.github/workflows/api-ci.yml' ]
  pull_request:
    paths: [ 'apps/api/**', '.github/workflows/api-ci.yml' ]

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: apps/api

      - name: Lint Code
        run: npm run lint
        working-directory: apps/api

      - name: Run Tests
        run: npm test
        working-directory: apps/api

      - name: Build Code
        run: npm run build
        working-directory: apps/api
