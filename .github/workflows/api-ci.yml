name: API CI\n\non: \n  workflow_dispatch:\n  push:\n    paths: [ 'apps/api/**', '.github/workflows/api-ci.yml' ]\n  pull_request:\n    paths: [ 'apps/api/**', '.github/workflows/api-ci.yml' ]\n\nconcurrency:\n  group: api-ci-${{ github.ref }}\n  cancel-in-progress: true\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout Code\n        uses: actions/checkout@v4\n\n      - name: Setup Node.js\n        uses: actions/setup-node@v4\n        with:\n          node-version: '22'\n          cache: 'npm'\n          cache-dependency-path: apps/api/package-lock.json\n\n      - name: Install Dependencies\n        run: npm ci\n        working-directory: apps/api\n\n      - name: Lint Code\n        run: npm run lint\n        working-directory: apps/api\n\n      - name: Run Tests\n        run: npm test\n        working-directory: apps/api\n\n      - name: Build Code\n        run: npm run build\n        working-directory: apps/api\n