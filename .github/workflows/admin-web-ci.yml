name: Admin Web CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/admin-web/**'
  pull_request:
    paths:
      - 'apps/admin-web/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'apps/admin-web/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: apps/admin-web

      - name: Lint
        run: npm run lint
        working-directory: apps/admin-web

      - name: Build
        run: npm run build
        working-directory: apps/admin-web