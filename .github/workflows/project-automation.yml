name: Project Automation

on:
  pull_request:
    types: [opened, closed]

jobs:
  update-project:
    runs-on: ubuntu-latest
    steps:
      - name: Move issue to In Progress when PR opens
        if: github.event.action == 'opened'
        run: echo "PR opened"

      - name: Move issue to Done when PR merged
        if: github.event.pull_request.merged == true
        run: echo "PR merged"
