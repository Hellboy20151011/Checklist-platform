name: Flutter CI

on:
  push:
    paths:
      - 'apps/technician-app/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'apps/technician-app/**'
      - '.github/workflows/flutter-ci.yml'

jobs:
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable

      - name: Install dependencies
        working-directory: apps/technician-app
        run: flutter pub get

      - name: Analyze code
        working-directory: apps/technician-app
        run: flutter analyze

      - name: Run tests
        working-directory: apps/technician-app
        run: flutter test
