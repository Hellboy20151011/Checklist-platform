version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: checklist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: checklist_platform
      POSTGRES_USER: postgres
      # WARNING: Change this password for production environments.
      # Use a .env file or Docker secrets to manage sensitive credentials.
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
